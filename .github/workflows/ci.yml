name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Supply chain security (gates everything else)
  # ---------------------------------------------------------------------------
  source-integrity:
    name: Source integrity
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect trojan source (Unicode/bidirectional attacks)
        run: |
          npx anti-trojan-source@1.8.1 --files='{stubs/**/*.js,lib/**/*.sh,scripts/**/*.js,enable-cowork.py}' --verbose || {
            EXIT_CODE=$?
            if [ "$EXIT_CODE" -eq 1 ]; then
              echo "::warning::Confusable characters found (emoji variation selectors, etc.) — review above"
            else
              echo "::error::Dangerous Unicode characters detected!"
              exit "$EXIT_CODE"
            fi
          }

      - name: Detect suspicious patterns in shell scripts
        run: |
          echo "Checking for encoded payloads, eval abuse, and suspicious downloads..."
          if grep -rn 'base64 -d\|base64 --decode' lib/ stubs/ scripts/ 2>/dev/null | grep -v '.git'; then
            echo "::warning::Found base64 decode operations - verify these are intentional"
          fi
          if grep -rn 'curl.*|.*sh\|wget.*|.*sh\|curl.*|.*bash\|wget.*|.*bash' lib/ stubs/ 2>/dev/null | grep -v '.git'; then
            echo "::error::Found curl/wget piped to shell - this is a supply chain risk"
            exit 1
          fi
          echo "Source patterns check passed"

  dependency-scan:
    name: Dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install scanning tools
        run: |
          VET_VERSION="v1.8.8"
          VET_SHA256="87ca148769b24e17bda459d0042152eb4472e832ca433eeadaac108a8c242e52"
          VET_URL="https://github.com/safedep/vet/releases/download/${VET_VERSION}/vet_Linux_x86_64.tar.gz"
          curl -sfL "$VET_URL" -o /tmp/vet.tar.gz || \
            curl -sfL "https://github.com/safedep/vet/releases/download/${VET_VERSION}/vet-linux-amd64.tar.gz" -o /tmp/vet.tar.gz || \
            echo "::warning::Could not download vet, malware scan will be skipped"
          if [ -f /tmp/vet.tar.gz ]; then
            ACTUAL_SHA=$(sha256sum /tmp/vet.tar.gz | cut -d' ' -f1)
            if [ "$ACTUAL_SHA" != "$VET_SHA256" ]; then
              echo "::error::vet SHA256 mismatch: expected $VET_SHA256, got $ACTUAL_SHA"
              rm /tmp/vet.tar.gz
            else
              tar xzf /tmp/vet.tar.gz -C /usr/local/bin/ 2>/dev/null || tar xzf /tmp/vet.tar.gz -C /tmp/ && cp /tmp/vet /usr/local/bin/ 2>/dev/null || true
              chmod +x /usr/local/bin/vet 2>/dev/null || true
            fi
          fi
          pip install owasp-depscan --quiet 2>/dev/null || echo "::warning::Could not install depscan"

      - name: Scan for malware in dependencies
        run: vet scan -D . --malware-query || true
        continue-on-error: true

      - name: OWASP dependency scan
        run: depscan --src . --reports-dir ./security-reports --no-banner || true
        continue-on-error: true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-reports
          path: security-reports/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Stage 2: Unit + integration tests (after security passes)
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    needs: [source-integrity, dependency-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run unit tests (Node.js)
        run: |
          node --test tests/test_credential_classifier.js
          node --test tests/test_path_safety.js
          node --test tests/test_computer_use.js
          node --test tests/test_bwrap_command.js
          node --test tests/test_session_store.js

      - name: Run unit tests (Python)
        run: python3 -m unittest tests/test_patches.py -v

      - name: Run integration tests
        run: bash tests/test_doctor.sh

  # ---------------------------------------------------------------------------
  # Stage 3: Package builds (after tests pass)
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.distro }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: fedora
            container: fedora@sha256:781b7642e8bf256e9cf75d2aa58d86f5cc695fd2df113517614e181a5eee9138
            format: rpm
          - distro: ubuntu
            container: ubuntu:24.04@sha256:186072bba1b2f436cbb91ef2567abca677337cfc786c86e107d25b7072feef0c
            format: deb
          - distro: archlinux
            container: archlinux@sha256:8435d30c1462f94345c3894ebbeaeecd658fcb284aa41b0bcc5f88728933447f
            format: arch

    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    steps:
      - name: Install git
        shell: bash
        run: |
          if command -v dnf &>/dev/null; then
            dnf install -y git
          elif command -v apt-get &>/dev/null; then
            apt-get update -qq && apt-get install -y -qq git sudo
          elif command -v pacman &>/dev/null; then
            pacman -Sy --noconfirm git
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build ${{ matrix.format }} package
        shell: bash
        run: FORMAT=${{ matrix.format }} ./build.sh

      - name: Verify nupkg SHA256
        shell: bash
        run: |
          SHA=$(sed -n '2p' CLAUDE_VERSION | tr -d '[:space:]')
          if [ -n "$SHA" ]; then
            NUPKG=$(find build/ -name '*.nupkg' | head -1)
            if [ -n "$NUPKG" ]; then
              ACTUAL=$(sha256sum "$NUPKG" | cut -d' ' -f1)
              if [ "$ACTUAL" != "$SHA" ]; then
                echo "::error::nupkg SHA256 mismatch: expected $SHA, got $ACTUAL"
                exit 1
              fi
              echo "SHA256 verified: $ACTUAL"
            fi
          else
            echo "No SHA256 pin — skipping"
          fi

      - name: Smoke test package contents
        shell: bash
        run: |
          PKG=$(find build/electron-app/ -type f \( -name "*.rpm" -o -name "*.deb" -o -name "*.pkg.tar.*" \) ! -name "*.sig" ! -name "*-computeruse*" | head -1)
          if [ -n "$PKG" ]; then
            echo "Testing package: $PKG"
            bash tests/test_package_contents.sh "${{ matrix.format }}" "$PKG"
          else
            echo "::warning::No package file found to test"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: claude-desktop-hardened-${{ matrix.format }}-${{ matrix.distro }}
          path: |
            build/electron-app/**/*.rpm
            build/electron-app/**/*.deb
            build/electron-app/**/*.pkg.tar.*
            build/electron-app/**/PKGBUILD
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Stage 4: SBOM generation (parallel with builds, after security)
  # ---------------------------------------------------------------------------
  sbom:
    name: SBOM
    needs: [source-integrity, dependency-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate CycloneDX SBOM
        run: |
          npm install -g @cyclonedx/cdxgen@11.11.0
          cdxgen -o sbom.json --spec-version 1.5 .
          echo "SBOM: $(jq '.components | length' sbom.json) components"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.json
