name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: fedora
            container: fedora:latest
            format: rpm
          - distro: ubuntu
            container: ubuntu:24.04
            format: deb
          - distro: archlinux
            container: archlinux:latest
            format: arch

    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    steps:
      - name: Install git (container may not have it)
        shell: bash
        run: |
          if command -v dnf &>/dev/null; then
            dnf install -y git
          elif command -v apt-get &>/dev/null; then
            apt-get update -qq && apt-get install -y -qq git sudo
          elif command -v pacman &>/dev/null; then
            pacman -Sy --noconfirm git
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build ${{ matrix.format }} package
        shell: bash
        run: FORMAT=${{ matrix.format }} ./build.sh

      - name: Verify nupkg SHA256 (if pinned)
        shell: bash
        run: |
          SHA=$(sed -n '2p' CLAUDE_VERSION | tr -d '[:space:]')
          if [ -n "$SHA" ]; then
            NUPKG=$(find build/ -name '*.nupkg' | head -1)
            if [ -n "$NUPKG" ]; then
              ACTUAL=$(sha256sum "$NUPKG" | cut -d' ' -f1)
              if [ "$ACTUAL" != "$SHA" ]; then
                echo "::error::nupkg SHA256 mismatch: expected $SHA, got $ACTUAL"
                exit 1
              fi
              echo "SHA256 verified: $ACTUAL"
            fi
          else
            echo "No SHA256 pin in CLAUDE_VERSION line 2 - skipping"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: claude-desktop-hardened-${{ matrix.format }}-${{ matrix.distro }}
          path: |
            build/electron-app/**/*.rpm
            build/electron-app/**/*.deb
            build/electron-app/**/*.pkg.tar.*
            build/electron-app/**/PKGBUILD
          if-no-files-found: warn
