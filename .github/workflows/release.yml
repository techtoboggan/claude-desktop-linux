name: Release

on:
  push:
    branches: [main]
    paths:
      - 'CLAUDE_VERSION'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read CLAUDE_VERSION
        id: version
        run: |
          VERSION=$(head -1 CLAUDE_VERSION | tr -d '[:space:]')
          # Count commits since last tag for this version, use as build number
          LAST_TAG=$(git tag -l "v${VERSION}-*" --sort=-v:refname | head -1)
          if [ -n "$LAST_TAG" ]; then
            BUILD=$(( $(echo "$LAST_TAG" | grep -oP '\d+$') + 1 ))
          else
            BUILD=1
          fi
          TAG="v${VERSION}-${BUILD}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}, tag: ${TAG}"

      - name: Check if release needed
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-rpm:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@v4

      - name: Build RPM
        shell: bash
        run: FORMAT=rpm ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: build/electron-app/**/*.rpm

  build-deb:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git sudo

      - uses: actions/checkout@v4

      - name: Build DEB
        shell: bash
        run: FORMAT=deb ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: build/electron-app/**/*.deb

  build-arch:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install git
        run: pacman -Sy --noconfirm git

      - uses: actions/checkout@v4

      - name: Build Arch package
        shell: bash
        run: FORMAT=arch ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: |
            build/electron-app/**/*.pkg.tar.*
            build/electron-app/**/PKGBUILD

  release:
    needs: [check-version, build-rpm, build-deb, build-arch]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git tag ${{ needs.check-version.outputs.tag }}
          git push origin ${{ needs.check-version.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Claude Desktop ${{ needs.check-version.outputs.version }} (build ${{ needs.check-version.outputs.tag }})
          body: |
            ## Claude Desktop v${{ needs.check-version.outputs.version }} for Linux

            ### Install

            **Fedora / RHEL / Rocky:**
            ```bash
            sudo dnf install claude-desktop-*.rpm
            ```

            **Debian / Ubuntu:**
            ```bash
            sudo dpkg -i claude-desktop_*.deb && sudo apt-get install -f
            ```

            **Arch Linux:**
            ```bash
            sudo pacman -U claude-desktop-*.pkg.tar.zst
            ```

            ### What's included
            - Claude Desktop with Cowork (Local Agent Mode) support
            - Bundled Claude Code CLI
            - MCP support
            - System tray integration
            - Native Wayland support
          files: |
            artifacts/**/*.rpm
            artifacts/**/*.deb
            artifacts/**/*.pkg.tar.*
            artifacts/**/PKGBUILD
          draft: false
          prerelease: false
