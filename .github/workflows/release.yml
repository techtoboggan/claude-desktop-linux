name: Release

on:
  push:
    branches: [main]
    paths:
      - 'CLAUDE_VERSION'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Read CLAUDE_VERSION
        id: version
        run: |
          VERSION=$(head -1 CLAUDE_VERSION | tr -d '[:space:]')
          LAST_TAG=$(git tag -l "v${VERSION}-*" --sort=-v:refname | head -1)
          if [ -n "$LAST_TAG" ]; then
            BUILD=$(( $(echo "$LAST_TAG" | grep -oP '\d+$') + 1 ))
          else
            BUILD=1
          fi
          TAG="v${VERSION}-${BUILD}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}, tag: ${TAG}"

      - name: Check if release needed
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-rpm:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: fedora@sha256:781b7642e8bf256e9cf75d2aa58d86f5cc695fd2df113517614e181a5eee9138
    steps:
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build RPM
        shell: bash
        run: FORMAT=rpm ./build.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rpm-package
          path: build/electron-app/**/*.rpm

  build-deb:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: ubuntu:24.04@sha256:186072bba1b2f436cbb91ef2567abca677337cfc786c86e107d25b7072feef0c
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git sudo

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build DEB
        shell: bash
        run: FORMAT=deb ./build.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb-package
          path: build/electron-app/**/*.deb

  build-arch:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: archlinux@sha256:8435d30c1462f94345c3894ebbeaeecd658fcb284aa41b0bcc5f88728933447f
    steps:
      - name: Install git
        run: pacman -Sy --noconfirm git

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Arch package
        shell: bash
        run: FORMAT=arch ./build.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: arch-package
          path: |
            build/electron-app/**/*.pkg.tar.*
            build/electron-app/**/PKGBUILD

  sbom:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate CycloneDX SBOM
        run: |
          npm install -g @cyclonedx/cdxgen@11.11.0
          cdxgen -o sbom.json --spec-version 1.5 .
          echo "SBOM: $(jq '.components | length' sbom.json) components"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.json

  release:
    needs: [check-version, build-rpm, build-deb, build-arch, sbom]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the API to create tags — avoids workflow permission issues
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/${{ needs.check-version.outputs.tag }}" \
            -f sha="${{ github.sha }}" || echo "Tag may already exist"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.rpm" -o -name "*.deb" -o -name "*.pkg.tar.*" -o -name "sbom.json" \) \
            -exec sha256sum {} \; | sort > ../SHA256SUMS
          cd ..
          echo "Generated checksums for $(wc -l < SHA256SUMS) files"
          cat SHA256SUMS

      - name: GPG sign checksums
        if: env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --yes --armor --detach-sign SHA256SUMS
          echo "Checksums signed with GPG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Claude Desktop ${{ needs.check-version.outputs.version }} (build ${{ needs.check-version.outputs.tag }})
          body: |
            ## Claude Desktop v${{ needs.check-version.outputs.version }} for Linux

            ### Quick install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/techtoboggan/claude-desktop-hardened-linux/main/install.sh | bash
            ```

            **Fedora (COPR):**
            ```bash
            sudo dnf copr enable techtoboggan/claude-desktop-hardened
            sudo dnf install claude-desktop-hardened
            ```

            ### Manual install
            Download packages from this release:
            ```bash
            sudo dnf install claude-desktop-hardened-*.rpm        # Fedora/RHEL
            sudo dpkg -i claude-desktop-hardened_*.deb            # Debian/Ubuntu
            sudo pacman -U claude-desktop-hardened-*.pkg.tar.zst  # Arch
            ```

            ### What's included
            - Claude Desktop with Cowork (Local Agent Mode) support + bubblewrap sandboxing
            - Bundled Claude Code CLI
            - MCP support
            - System tray integration
            - Native Wayland support

            ### Supply chain security
            - SBOM (CycloneDX) attached as `sbom.json`
            - `SHA256SUMS` with GPG signature for integrity verification
            - All CI actions pinned to commit SHAs
            - Source scanned for trojan source attacks and malware
            - nupkg SHA256 verified against pin in `CLAUDE_VERSION`
          files: |
            artifacts/**/*.rpm
            artifacts/**/*.deb
            artifacts/**/*.pkg.tar.*
            artifacts/**/PKGBUILD
            artifacts/sbom/sbom.json
            SHA256SUMS
            SHA256SUMS.asc
          draft: false
          prerelease: false

  # ---------------------------------------------------------------------------
  # Publish to Fedora COPR
  # ---------------------------------------------------------------------------
  publish-copr:
    needs: [check-version, release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: fedora@sha256:781b7642e8bf256e9cf75d2aa58d86f5cc695fd2df113517614e181a5eee9138
    steps:
      - name: Install tools
        run: dnf install -y copr-cli rpm-build rpmdevtools cpio gettext

      - name: Configure COPR
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          mkdir -p ~/.config
          printf '[copr-cli]\nlogin = %s\nusername = %s\ntoken = %s\ncopr_url = https://copr.fedoraproject.org\n' \
            "$COPR_LOGIN" "$COPR_USERNAME" "$COPR_TOKEN" > ~/.config/copr

      - name: Download RPM from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dnf install -y gh
          gh release download "${{ needs.check-version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.rpm" \
            --dir ./rpms

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: source

      - name: Build SRPM from binary RPM
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          TAG: ${{ needs.check-version.outputs.tag }}
        run: |
          RPM_FILE=$(ls ./rpms/*.rpm | head -1)

          # Extract the binary RPM contents into a tarball
          mkdir -p extract
          cd extract && rpm2cpio "../$RPM_FILE" | cpio -idmv 2>/dev/null && cd ..
          tar czf claude-desktop-hardened-${VERSION}.tar.gz -C extract .

          # Use the generated COPR spec from the repo (single source of truth)
          export VERSION
          envsubst '$VERSION' < source/packaging/rpm/claude-desktop-hardened.copr.spec.in > claude-desktop-hardened.spec

          # Build SRPM
          rpmdev-setuptree
          cp claude-desktop-hardened-${VERSION}.tar.gz ~/rpmbuild/SOURCES/
          cp claude-desktop-hardened.spec ~/rpmbuild/SPECS/
          rpmbuild -bs ~/rpmbuild/SPECS/claude-desktop-hardened.spec

      - name: Upload SRPM to COPR
        run: |
          SRPM=$(find ~/rpmbuild/SRPMS/ -name '*.src.rpm' | head -1)
          echo "Uploading $SRPM"
          copr-cli build claude-desktop-hardened "$SRPM" \
            --chroot fedora-43-x86_64 \
            --chroot fedora-44-x86_64 \
            --nowait

  # ---------------------------------------------------------------------------
  # Publish APT repository to GitHub Pages
  # ---------------------------------------------------------------------------
  publish-apt:
    needs: [check-version, release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Install APT repo tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq apt-utils

      - name: Download DEB from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf ./incoming
          gh release download "${{ needs.check-version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.deb" \
            --dir ./incoming \
            --clobber

      - name: Update APT repository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          # Move .deb into pool
          mkdir -p pool/main
          cp incoming/*.deb pool/main/

          # Generate Packages index
          mkdir -p dists/stable/main/binary-amd64
          apt-ftparchive packages pool/main > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages

          # Generate Release file
          cat > dists/stable/Release <<RELEOF
          Origin: claude-desktop-hardened
          Label: Claude Desktop Hardened Linux
          Suite: stable
          Codename: stable
          Architectures: amd64
          Components: main
          Date: $(date -Ru)
          Description: Security-focused Claude Desktop for Linux
          RELEOF
          sed -i 's/^          //' dists/stable/Release

          # Add hashes to Release
          apt-ftparchive release dists/stable >> dists/stable/Release

          # GPG sign if key is available
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            gpg --batch --yes --armor --detach-sign -o dists/stable/Release.gpg dists/stable/Release
            gpg --batch --yes --armor --clearsign -o dists/stable/InRelease dists/stable/Release
            # Export public key for users
            gpg --batch --yes --armor --export > pubkey.asc
            echo "APT repo signed with GPG"
          else
            echo "WARNING: No GPG key — APT repo is unsigned"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "apt: update to ${{ needs.check-version.outputs.version }}" || echo "No changes"
          git push origin gh-pages

  # ---------------------------------------------------------------------------
  # Publish to AUR
  # ---------------------------------------------------------------------------
  publish-aur:
    needs: [check-version, release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Update AUR package
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          VERSION: ${{ needs.check-version.outputs.version }}
          TAG: ${{ needs.check-version.outputs.tag }}
        if: env.AUR_SSH_KEY != ''
        run: |
          # Set up SSH for AUR
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<SSHEOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          SSHEOF

          # Clone AUR repo
          git clone ssh://aur@aur.archlinux.org/claude-desktop-hardened-bin.git /tmp/aur
          cd /tmp/aur

          # Update PKGBUILD version
          BUILDNUM=$(echo "$TAG" | grep -oP '\d+$')
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^_buildnum=.*/_buildnum=${BUILDNUM}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Regenerate .SRCINFO (copy PKGBUILD to temp dir to avoid .git permission issues)
          docker run --rm -v "$(pwd)/PKGBUILD:/tmp/PKGBUILD:ro" archlinux@sha256:8435d30c1462f94345c3894ebbeaeecd658fcb284aa41b0bcc5f88728933447f bash -c \
            'pacman -Sy --noconfirm base-devel sudo >/dev/null 2>&1 && useradd -m builduser && cp /tmp/PKGBUILD /home/builduser/ && chown builduser: /home/builduser/PKGBUILD && cd /home/builduser && sudo -u builduser makepkg --printsrcinfo' > .SRCINFO

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}" || echo "No changes"
          git push
