name: Release

on:
  push:
    branches: [main]
    paths:
      - 'CLAUDE_VERSION'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Read CLAUDE_VERSION
        id: version
        run: |
          VERSION=$(head -1 CLAUDE_VERSION | tr -d '[:space:]')
          LAST_TAG=$(git tag -l "v${VERSION}-*" --sort=-v:refname | head -1)
          if [ -n "$LAST_TAG" ]; then
            BUILD=$(( $(echo "$LAST_TAG" | grep -oP '\d+$') + 1 ))
          else
            BUILD=1
          fi
          TAG="v${VERSION}-${BUILD}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}, tag: ${TAG}"

      - name: Check if release needed
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-rpm:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build RPM
        shell: bash
        run: FORMAT=rpm ./build.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rpm-package
          path: build/electron-app/**/*.rpm

  build-deb:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git sudo

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build DEB
        shell: bash
        run: FORMAT=deb ./build.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb-package
          path: build/electron-app/**/*.deb

  build-arch:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install git
        run: pacman -Sy --noconfirm git

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Arch package
        shell: bash
        run: FORMAT=arch ./build.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: arch-package
          path: |
            build/electron-app/**/*.pkg.tar.*
            build/electron-app/**/PKGBUILD

  sbom:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate CycloneDX SBOM
        run: |
          npm install -g @cyclonedx/cdxgen@11
          cdxgen -o sbom.json --spec-version 1.5 .
          echo "SBOM: $(jq '.components | length' sbom.json) components"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.json

  release:
    needs: [check-version, build-rpm, build-deb, build-arch, sbom]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create tag
        run: |
          git tag ${{ needs.check-version.outputs.tag }}
          git push origin ${{ needs.check-version.outputs.tag }}

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Claude Desktop ${{ needs.check-version.outputs.version }} (build ${{ needs.check-version.outputs.tag }})
          body: |
            ## Claude Desktop v${{ needs.check-version.outputs.version }} for Linux

            ### Quick install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/techtoboggan/claude-desktop-linux/main/install.sh | bash
            ```

            ### Package repositories

            **Fedora (COPR):**
            ```bash
            sudo dnf copr enable techtoboggan/claude-desktop
            sudo dnf install claude-desktop
            ```

            **Debian / Ubuntu (APT):**
            ```bash
            curl -fsSL https://techtoboggan.github.io/claude-desktop-linux/claude-desktop.gpg.key \
              | sudo gpg --dearmor -o /etc/apt/keyrings/claude-desktop.gpg
            echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/claude-desktop.gpg] https://techtoboggan.github.io/claude-desktop-linux stable main" \
              | sudo tee /etc/apt/sources.list.d/claude-desktop.list
            sudo apt update && sudo apt install claude-desktop
            ```

            **Arch Linux (AUR):**
            ```bash
            yay -S claude-desktop-bin
            ```

            ### Manual install
            Download packages from this release:
            ```bash
            sudo dnf install claude-desktop-*.rpm        # Fedora/RHEL
            sudo dpkg -i claude-desktop_*.deb            # Debian/Ubuntu
            sudo pacman -U claude-desktop-*.pkg.tar.zst  # Arch
            ```

            ### What's included
            - Claude Desktop with Cowork (Local Agent Mode) support
            - Bundled Claude Code CLI
            - MCP support
            - System tray integration
            - Native Wayland support

            ### Supply chain security
            - SBOM (CycloneDX) attached as `sbom.json`
            - All CI actions pinned to commit SHAs
            - Source scanned for trojan source attacks and malware
            - nupkg SHA256 verified against pin in `CLAUDE_VERSION`
          files: |
            artifacts/**/*.rpm
            artifacts/**/*.deb
            artifacts/**/*.pkg.tar.*
            artifacts/**/PKGBUILD
            artifacts/sbom/sbom.json
          draft: false
          prerelease: false

  # ---------------------------------------------------------------------------
  # Publish to Fedora COPR
  # ---------------------------------------------------------------------------
  publish-copr:
    needs: [check-version, release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - name: Install copr-cli
        run: pip install copr-cli

      - name: Configure COPR
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr <<'EOF'
          [copr-cli]
          login = ${{ secrets.COPR_LOGIN }}
          username = ${{ secrets.COPR_USERNAME }}
          token = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedoraproject.org
          EOF

      - name: Download RPM from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.check-version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.rpm" \
            --dir ./rpms

      - name: Upload to COPR
        run: |
          RPM_FILE=$(ls ./rpms/*.rpm | head -1)
          copr-cli build claude-desktop "$RPM_FILE" --nowait

  # ---------------------------------------------------------------------------
  # Publish APT repository to GitHub Pages
  # ---------------------------------------------------------------------------
  publish-apt:
    needs: [check-version, release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - name: Checkout gh-pages branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: gh-pages
          path: repo-site
          fetch-depth: 1
        continue-on-error: true

      - name: Initialize gh-pages if needed
        run: |
          if [ ! -d repo-site/.git ]; then
            mkdir -p repo-site
            cd repo-site
            git init
            git checkout -b gh-pages
          fi
          mkdir -p repo-site/pool/main
          mkdir -p repo-site/dists/stable/main/binary-amd64

      - name: Download DEB from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.check-version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.deb" \
            --dir ./repo-site/pool/main

      - name: Import GPG key
        run: echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Generate APT repository metadata
        run: |
          cd repo-site

          # Export public key for users to download
          GPG_EMAIL=$(gpg --list-keys --keyid-format long 2>/dev/null | grep uid | head -1 | sed 's/.*<\(.*\)>.*/\1/')
          gpg --armor --export "$GPG_EMAIL" > claude-desktop.gpg.key

          # Generate Packages file
          dpkg-scanpackages --multiversion pool/ > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages

          # Generate Release file
          cd dists/stable
          cat > Release <<REOF
          Origin: claude-desktop-linux
          Label: Claude Desktop for Linux
          Suite: stable
          Codename: stable
          Architectures: amd64
          Components: main
          Description: Claude Desktop for Linux APT Repository
          Date: $(date -Ru)
          REOF
          apt-ftparchive release . >> Release

          # Sign
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --clearsign -o InRelease Release

      - name: Commit and push to gh-pages
        run: |
          cd repo-site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          REMOTE_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git remote set-url origin "$REMOTE_URL" 2>/dev/null || git remote add origin "$REMOTE_URL"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update APT repo for ${{ needs.check-version.outputs.tag }}"
          git push origin gh-pages || git push --set-upstream origin gh-pages

  # ---------------------------------------------------------------------------
  # Publish to AUR
  # ---------------------------------------------------------------------------
  publish-aur:
    needs: [check-version, release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install dependencies
        run: pacman -Sy --noconfirm git openssh base-devel

      - name: Configure SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking accept-new
          EOF

      - name: Clone AUR repo
        run: |
          git clone ssh://aur@aur.archlinux.org/claude-desktop-bin.git aur-repo || {
            mkdir aur-repo && cd aur-repo && git init && git remote add origin ssh://aur@aur.archlinux.org/claude-desktop-bin.git
          }
          cd aur-repo
          git config user.name "Claude Desktop Bot"
          git config user.email "claude-desktop@techtoboggan.github.io"

      - name: Generate PKGBUILD
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          TAG: ${{ needs.check-version.outputs.tag }}
        run: |
          # Download the DEB to compute checksum (more reliable than .pkg.tar.zst across arch versions)
          curl -sL "https://github.com/${{ github.repository }}/releases/download/${TAG}/claude-desktop_${VERSION}_amd64.deb" \
            -o /tmp/claude-desktop.deb
          SHA256=$(sha256sum /tmp/claude-desktop.deb | cut -d' ' -f1)

          cat > aur-repo/PKGBUILD <<PKGEOF
          # Maintainer: TechToboggan <techtoboggan@users.noreply.github.com>
          pkgname=claude-desktop-bin
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="Claude Desktop for Linux with Cowork, MCP, and bundled Claude Code CLI"
          arch=('x86_64')
          url="https://github.com/techtoboggan/claude-desktop-linux"
          license=('custom:proprietary')
          depends=('electron' 'nodejs')
          optdepends=('libsecret: credential storage via gnome-keyring'
                      'xdg-utils: URL handler registration')
          provides=('claude-desktop')
          conflicts=('claude-desktop')
          source=("claude-desktop-\${pkgver}.deb::https://github.com/techtoboggan/claude-desktop-linux/releases/download/${TAG}/claude-desktop_\${pkgver}_amd64.deb")
          sha256sums=('${SHA256}')
          noextract=("claude-desktop-\${pkgver}.deb")

          package() {
            cd "\${srcdir}"
            bsdtar -xf "claude-desktop-\${pkgver}.deb"
            bsdtar -xf data.tar.* -C "\${pkgdir}/"
          }
          PKGEOF

          # Strip leading whitespace from heredoc
          sed -i 's/^          //' aur-repo/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          cd aur-repo
          useradd -m _build 2>/dev/null || true
          chown -R _build:_build .
          su _build -c "makepkg --printsrcinfo" > .SRCINFO

      - name: Push to AUR
        run: |
          cd aur-repo
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "Update to ${{ needs.check-version.outputs.version }}"
          git push origin master
