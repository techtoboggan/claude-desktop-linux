name: Release

on:
  push:
    branches: [main]
    paths:
      - 'CLAUDE_VERSION'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Read CLAUDE_VERSION
        id: version
        run: |
          VERSION=$(head -1 CLAUDE_VERSION | tr -d '[:space:]')
          LAST_TAG=$(git tag -l "v${VERSION}-*" --sort=-v:refname | head -1)
          if [ -n "$LAST_TAG" ]; then
            BUILD=$(( $(echo "$LAST_TAG" | grep -oP '\d+$') + 1 ))
          else
            BUILD=1
          fi
          TAG="v${VERSION}-${BUILD}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}, tag: ${TAG}"

      - name: Check if release needed
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-rpm:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build RPM
        shell: bash
        run: FORMAT=rpm ./build.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rpm-package
          path: build/electron-app/**/*.rpm

  build-deb:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git sudo

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build DEB
        shell: bash
        run: FORMAT=deb ./build.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb-package
          path: build/electron-app/**/*.deb

  build-arch:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install git
        run: pacman -Sy --noconfirm git

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Arch package
        shell: bash
        run: FORMAT=arch ./build.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: arch-package
          path: |
            build/electron-app/**/*.pkg.tar.*
            build/electron-app/**/PKGBUILD

  sbom:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate CycloneDX SBOM
        run: |
          npm install -g @cyclonedx/cdxgen@11
          cdxgen -o sbom.json --spec-version 1.5 .
          echo "SBOM: $(jq '.components | length' sbom.json) components"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.json

  release:
    needs: [check-version, build-rpm, build-deb, build-arch, sbom]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create tag
        run: |
          git tag ${{ needs.check-version.outputs.tag }}
          git push origin ${{ needs.check-version.outputs.tag }}

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Claude Desktop ${{ needs.check-version.outputs.version }} (build ${{ needs.check-version.outputs.tag }})
          body: |
            ## Claude Desktop v${{ needs.check-version.outputs.version }} for Linux

            ### Quick install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/techtoboggan/claude-desktop-hardened-linux/main/install.sh | bash
            ```

            **Fedora (COPR):**
            ```bash
            sudo dnf copr enable techtoboggan/claude-desktop-hardened
            sudo dnf install claude-desktop-hardened
            ```

            ### Manual install
            Download packages from this release:
            ```bash
            sudo dnf install claude-desktop-hardened-*.rpm        # Fedora/RHEL
            sudo dpkg -i claude-desktop-hardened_*.deb            # Debian/Ubuntu
            sudo pacman -U claude-desktop-hardened-*.pkg.tar.zst  # Arch
            ```

            ### What's included
            - Claude Desktop with Cowork (Local Agent Mode) support + bubblewrap sandboxing
            - Bundled Claude Code CLI
            - MCP support
            - System tray integration
            - Native Wayland support

            ### Supply chain security
            - SBOM (CycloneDX) attached as `sbom.json`
            - All CI actions pinned to commit SHAs
            - Source scanned for trojan source attacks and malware
            - nupkg SHA256 verified against pin in `CLAUDE_VERSION`
          files: |
            artifacts/**/*.rpm
            artifacts/**/*.deb
            artifacts/**/*.pkg.tar.*
            artifacts/**/PKGBUILD
            artifacts/sbom/sbom.json
          draft: false
          prerelease: false

  # ---------------------------------------------------------------------------
  # Publish to Fedora COPR
  # ---------------------------------------------------------------------------
  publish-copr:
    needs: [check-version, release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install tools
        run: dnf install -y copr-cli rpm-build rpmdevtools cpio

      - name: Configure COPR
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          mkdir -p ~/.config
          printf '[copr-cli]\nlogin = %s\nusername = %s\ntoken = %s\ncopr_url = https://copr.fedoraproject.org\n' \
            "$COPR_LOGIN" "$COPR_USERNAME" "$COPR_TOKEN" > ~/.config/copr

      - name: Download RPM from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dnf install -y gh
          gh release download "${{ needs.check-version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.rpm" \
            --dir ./rpms

      - name: Build SRPM from binary RPM
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          TAG: ${{ needs.check-version.outputs.tag }}
        run: |
          RPM_FILE=$(ls ./rpms/*.rpm | head -1)

          # Extract the binary RPM contents into a tarball
          mkdir -p extract
          cd extract && rpm2cpio "../$RPM_FILE" | cpio -idmv 2>/dev/null && cd ..
          tar czf claude-desktop-hardened-${VERSION}.tar.gz -C extract .

          # Create a repackaging spec
          cat > claude-desktop-hardened.spec <<SPEC
          # Disable build-id checks and stripping — this is a binary repackage
          %global _missing_build_ids_terminate_build 0
          %global _enable_debug_packages 0
          %global debug_package %{nil}
          %global __os_install_post %{nil}
          %global __strip /bin/true

          Name:           claude-desktop-hardened
          Version:        ${VERSION}
          Release:        1%{?dist}
          Summary:        Claude Desktop for Linux (hardened)
          License:        Proprietary
          URL:            https://github.com/techtoboggan/claude-desktop-hardened-linux
          Source0:        claude-desktop-hardened-${VERSION}.tar.gz
          AutoReqProv:    no
          BuildArch:      x86_64
          Requires:       nodejs >= 18.0.0
          Requires:       xdg-utils
          Recommends:     bubblewrap
          Recommends:     gnome-keyring
          Provides:       claude-desktop = %{version}-%{release}
          Conflicts:      claude-desktop

          %description
          Claude Desktop for Linux (hardened) with Cowork (Local Agent Mode), MCP support,
          bubblewrap sandboxing, credential redaction, and bundled Claude Code CLI.

          %prep
          %setup -c -T
          tar xzf %{SOURCE0}

          %install
          cp -a . %{buildroot}/

          %post
          gtk-update-icon-cache -f -t %{_datadir}/icons/hicolor 2>/dev/null || :
          update-desktop-database %{_datadir}/applications 2>/dev/null || :
          chmod +x %{_bindir}/claude 2>/dev/null || :
          # Set chrome-sandbox setuid for Electron sandbox
          for p in /usr/lib64/claude-desktop-hardened/app.asar.unpacked/node_modules/electron/dist/chrome-sandbox \
                   "$(dirname "$(command -v electron 2>/dev/null)")/../lib/node_modules/electron/dist/chrome-sandbox"; do
            if [ -f "\$p" ]; then chown root:root "\$p" && chmod 4755 "\$p"; break; fi
          done || :

          %postun
          gtk-update-icon-cache -f -t %{_datadir}/icons/hicolor 2>/dev/null || :
          update-desktop-database %{_datadir}/applications 2>/dev/null || :

          %files
          %{_bindir}/claude-desktop-hardened
          %{_bindir}/claude
          /usr/lib64/claude-desktop-hardened/
          %{_datadir}/applications/claude-desktop-hardened.desktop
          %{_datadir}/icons/hicolor/*/apps/claude-desktop-hardened.png
          SPEC

          # Strip leading whitespace from heredoc
          sed -i 's/^          //' claude-desktop-hardened.spec

          # Build SRPM
          rpmdev-setuptree
          cp claude-desktop-hardened-${VERSION}.tar.gz ~/rpmbuild/SOURCES/
          cp claude-desktop-hardened.spec ~/rpmbuild/SPECS/
          rpmbuild -bs ~/rpmbuild/SPECS/claude-desktop-hardened.spec

      - name: Upload SRPM to COPR
        run: |
          SRPM=$(find ~/rpmbuild/SRPMS/ -name '*.src.rpm' | head -1)
          echo "Uploading $SRPM"
          copr-cli build claude-desktop-hardened "$SRPM" \
            --chroot fedora-43-x86_64 \
            --chroot fedora-44-x86_64 \
            --nowait

