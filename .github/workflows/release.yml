name: Release

on:
  push:
    branches: [main]
    paths:
      - 'CLAUDE_VERSION'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Read CLAUDE_VERSION
        id: version
        run: |
          VERSION=$(head -1 CLAUDE_VERSION | tr -d '[:space:]')
          LAST_TAG=$(git tag -l "v${VERSION}-*" --sort=-v:refname | head -1)
          if [ -n "$LAST_TAG" ]; then
            BUILD=$(( $(echo "$LAST_TAG" | grep -oP '\d+$') + 1 ))
          else
            BUILD=1
          fi
          TAG="v${VERSION}-${BUILD}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}, tag: ${TAG}"

      - name: Check if release needed
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-rpm:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build RPM
        shell: bash
        run: FORMAT=rpm ./build.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rpm-package
          path: build/electron-app/**/*.rpm

  build-deb:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git sudo

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build DEB
        shell: bash
        run: FORMAT=deb ./build.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb-package
          path: build/electron-app/**/*.deb

  build-arch:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install git
        run: pacman -Sy --noconfirm git

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Arch package
        shell: bash
        run: FORMAT=arch ./build.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: arch-package
          path: |
            build/electron-app/**/*.pkg.tar.*
            build/electron-app/**/PKGBUILD

  sbom:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate CycloneDX SBOM
        run: |
          npm install -g @cyclonedx/cdxgen@11
          cdxgen -o sbom.json --spec-version 1.5 .
          echo "SBOM: $(jq '.components | length' sbom.json) components"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.json

  release:
    needs: [check-version, build-rpm, build-deb, build-arch, sbom]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create tag
        run: |
          git tag ${{ needs.check-version.outputs.tag }}
          git push origin ${{ needs.check-version.outputs.tag }}

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Claude Desktop ${{ needs.check-version.outputs.version }} (build ${{ needs.check-version.outputs.tag }})
          body: |
            ## Claude Desktop v${{ needs.check-version.outputs.version }} for Linux

            ### Quick install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/techtoboggan/claude-desktop-linux/main/install.sh | bash
            ```

            ### Package repositories

            **Fedora (COPR):**
            ```bash
            sudo dnf copr enable techtoboggan/claude-desktop
            sudo dnf install claude-desktop
            ```

            **Debian / Ubuntu (APT):**
            ```bash
            curl -fsSL https://techtoboggan.github.io/claude-desktop-linux/claude-desktop.gpg.key \
              | sudo gpg --dearmor -o /etc/apt/keyrings/claude-desktop.gpg
            echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/claude-desktop.gpg] https://techtoboggan.github.io/claude-desktop-linux stable main" \
              | sudo tee /etc/apt/sources.list.d/claude-desktop.list
            sudo apt update && sudo apt install claude-desktop
            ```

            **Arch Linux (AUR):**
            ```bash
            yay -S claude-desktop-bin
            ```

            ### Manual install
            Download packages from this release:
            ```bash
            sudo dnf install claude-desktop-*.rpm        # Fedora/RHEL
            sudo dpkg -i claude-desktop_*.deb            # Debian/Ubuntu
            sudo pacman -U claude-desktop-*.pkg.tar.zst  # Arch
            ```

            ### What's included
            - Claude Desktop with Cowork (Local Agent Mode) support
            - Bundled Claude Code CLI
            - MCP support
            - System tray integration
            - Native Wayland support

            ### Supply chain security
            - SBOM (CycloneDX) attached as `sbom.json`
            - All CI actions pinned to commit SHAs
            - Source scanned for trojan source attacks and malware
            - nupkg SHA256 verified against pin in `CLAUDE_VERSION`
          files: |
            artifacts/**/*.rpm
            artifacts/**/*.deb
            artifacts/**/*.pkg.tar.*
            artifacts/**/PKGBUILD
            artifacts/sbom/sbom.json
          draft: false
          prerelease: false

  # ---------------------------------------------------------------------------
  # Publish to Fedora COPR
  # ---------------------------------------------------------------------------
  publish-copr:
    needs: [check-version, release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - name: Install copr-cli
        run: pip install copr-cli

      - name: Configure COPR
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          mkdir -p ~/.config
          printf '[copr-cli]\nlogin = %s\nusername = %s\ntoken = %s\ncopr_url = https://copr.fedoraproject.org\n' \
            "$COPR_LOGIN" "$COPR_USERNAME" "$COPR_TOKEN" > ~/.config/copr

      - name: Download RPM from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ needs.check-version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.rpm" \
            --dir ./rpms

      - name: Upload to COPR
        run: |
          RPM_FILE=$(ls ./rpms/*.rpm | head -1)
          copr-cli build claude-desktop "$RPM_FILE" --nowait

  # ---------------------------------------------------------------------------
  # TODO: Publish APT repository to GitHub Pages (enable when GPG key is set up)
  # ---------------------------------------------------------------------------
  # publish-apt:
  #   needs: [check-version, release]
  #   ...

  # ---------------------------------------------------------------------------
  # TODO: Publish to AUR (enable when AUR SSH key is set up)
  # ---------------------------------------------------------------------------
  # publish-aur:
  #   needs: [check-version, release]
  #   ...
